<!-- templates/manage_doctors.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Manage Doctors</h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mb-3">Back to Dashboard</a>

    <!-- Add Doctor Form -->
    <div class="card mb-4">
        <div class="card-body">
            <h4>Add New Doctor</h4>
            <form method="POST" action="{{ url_for('add_doctor') }}">
                <div class="row g-3">
                    <div class="col-md-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
                    <div class="col-md-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
                    <div class="col-md-3"><input type="text" name="name" class="form-control" placeholder="Full Name" required></div>
                    <div class="col-md-3"><input type="text" name="specialization" class="form-control" placeholder="Specialization" required></div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Add Doctor</button>
            </form>
        </div>
    </div>

    <!-- Doctors Table -->
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Specialization</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in doctors %}
            <tr>
                <td>{{ doc.id }}</td>
                <td>{{ doc.user.name }}</td>
                <td>{{ doc.user.username }}</td>
                <td>{{ doc.specialization }}</td>
                <td>
                    <a href="{{ url_for('edit_doctor', doctor_id=doc.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{{ url_for('delete_doctor', doctor_id=doc.id) }}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this doctor?')">Delete</a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center">No doctors found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
